# Example goarch configuration.
# Copy this to .goarch.yml in your project root and customize.

rules:

  # Layer isolation: control which packages can import what.
  layerguard:
    layers:
      "internal/subprocess":
        allow: ["internal/errors"]
        deny_all_others: true
      "internal/core":
        deny: ["internal/transport/*", "cmd/*"]
      "internal/transport/rest":
        allow: ["internal/api", "internal/errors"]
        deny_all_others: true
      "internal/transport/grpc":
        allow: ["internal/api", "internal/errors"]
        deny_all_others: true

  # Ban specific packages/methods outside allowed locations.
  execguard:
    banned:
      - pkg: "os/exec"
        except: ["internal/subprocess"]
        reason: "Shell execution only allowed in subprocess package"
      - pkg: "os"
        methods: ["Getenv", "Setenv", "LookupEnv"]
        except: ["internal/config"]
        reason: "Environment access only through config package"
      - pkg: "net/smtp"
        reason: "Use email service abstraction"
      - pkg: "fmt"
        methods: ["Println", "Printf", "Print"]
        except: ["cmd/*"]
        reason: "Use structured logging"
      - pkg: "time"
        methods: ["Sleep"]
        except: ["internal/retry"]
        reason: "Use retry/backoff instead of sleep"
      # Banned libraries
      - pkg: "github.com/sirupsen/logrus"
        reason: "Use zerolog or slog"
      - pkg: "github.com/gin-gonic/gin"
        reason: "Use chi"

  # Ensure sensitive fields use a wrapper type.
  secretguard:
    type: "Secret"
    field_patterns:
      - "password"
      - "token"
      - "secret"
      - "api_key"
      - "apikey"
      - "private_key"
      - "privatekey"
      - "ssn"
      - "credit_card"
      - "cvv"

  # Limit imports per file (fan-out complexity).
  fanout:
    max_imports: 20

  # Limit exported methods per type.
  methodcount:
    max_public_methods: 25

  # Prevent internal types from leaking into public API.
  apileak:
    public_packages: ["internal/api"]
    banned_types_in_public:
      - "internal/executor.*"
      - "internal/statebackend.*"

  # Limit function body length.
  funlen:
    max_lines: 75

  # Limit function parameters.
  argcount:
    max_args: 7

  # Limit cyclomatic complexity.
  complexity:
    max_complexity: 15

  # Ban modules in go.mod.
  depban:
    deny:
      - module: "github.com/sirupsen/logrus"
        reason: "Use zerolog or slog"
      - module: "github.com/gin-gonic/gin"
        reason: "Use chi"
    max_dependencies: 50

  # Validate struct tag naming conventions.
  tagguard:
    packages:
      "internal/api":
        json_naming: "snake_case"
        require_json_tags: true

  # Restrict where error types can be defined.
  errguard:
    allowed_packages: ["internal/domain", "internal/errors"]

  # Verify endpoint auth middleware coverage.
  authguard:
    router_package: "cmd/api"
    auth_middleware: "middleware.Auth"
    exempt_patterns: ["/health", "/auth/*", "/webhooks/*"]

  # Run external tools as part of validation.
  # external:
  #   - name: "golangci-lint"
  #     cmd: "golangci-lint run ./..."
  #   - name: "nilaway"
  #     cmd: "nilaway ./..."
